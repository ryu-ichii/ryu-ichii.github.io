<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications — Jane Doe</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="pub-wrap">
    <div class="pub-grid">
      <h2>Journal Articles</h2>
      <div class="pub-list">
        <div class="article-card">
          <div class="article-content">
            <h2 class="article-title"><a href="#">Mapping Memory: Landscapes in Transition</a></h2>
            <p class="journal-name">Southern Literary Review</p>
          </div>
        </div>

        <div class="article-card">
          <div class="article-content">
            <h2 class="article-title"><a href="#">Fragments of a Forgotten City</a></h2>
            <p class="journal-name">Urban Essays Quarterly</p>
          </div>
        </div>

        <div class="article-card">
          <div class="article-content">
            <h2 class="article-title"><a href="#">The Ethics of Remembering</a></h2>
            <p class="journal-name">The Memory Studies Journal</p>
          </div>
        </div>

        <div class="article-card">
          <div class="article-content">
            <h2 class="article-title"><a href="#">Ghosts in the Archive</a></h2>
            <p class="journal-name">Historical Perspectives</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    fetch("header.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
        const current = location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-links a').forEach(link => {
          const linkFile = link.getAttribute('href').replace('./', '') || 'index.html';
          if (current === linkFile || (current === '' && linkFile === 'index.html')) {
            link.classList.add('active');
          }
        });
      });
  </script>
</body>
</html>
